name: 🚀 Deploy to InfinityFree

on:
  push:
    branches: [main]
  workflow_dispatch: # Tombol manual deploy di GitHub

jobs:
  deploy:
    name: 📦 Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout kode dari repository
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup PHP 8.3
      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, json, bcmath, curl

      # 3. Cache Composer dependencies
      - name: 💾 Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      # 4. Install Composer dependencies (production only)
      - name: 📦 Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      # 5. Setup Node.js
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 6. Install NPM dependencies
      - name: 📦 Install NPM Dependencies
        run: npm ci

      # 7. Build Vite + Tailwind assets
      - name: 🔨 Build Vite Assets
        run: npm run build

      # 8. Siapkan struktur folder sesuai InfinityFree
      - name: 📁 Prepare Deployment Structure
        run: |
          mkdir -p deploy/laravel_core

          # ===== Public files → deploy/ (htdocs/) =====
          # index.php yang sudah dimodifikasi path-nya
          cp index.php.production deploy/index.php
          # .htaccess untuk rewrite rules
          cp public/.htaccess deploy/.htaccess
          # Vite build output
          cp -r public/build deploy/build
          # Static assets
          [ -d public/assets ] && cp -r public/assets deploy/assets || true
          [ -d public/images ] && cp -r public/images deploy/images || true
          [ -f public/favicon.ico ] && cp public/favicon.ico deploy/favicon.ico || true
          [ -f public/robots.txt ] && cp public/robots.txt deploy/robots.txt || true

          # ===== Core Laravel → deploy/laravel_core/ =====
          cp -r app deploy/laravel_core/app
          cp -r bootstrap deploy/laravel_core/bootstrap
          cp -r config deploy/laravel_core/config
          cp -r database deploy/laravel_core/database
          cp -r resources deploy/laravel_core/resources
          cp -r routes deploy/laravel_core/routes
          cp -r vendor deploy/laravel_core/vendor
          cp artisan deploy/laravel_core/artisan
          cp composer.json deploy/laravel_core/composer.json
          cp composer.lock deploy/laravel_core/composer.lock

          # ===== Storage structure (buat folder kosong) =====
          mkdir -p deploy/laravel_core/storage/app/public
          mkdir -p deploy/laravel_core/storage/framework/cache/data
          mkdir -p deploy/laravel_core/storage/framework/sessions
          mkdir -p deploy/laravel_core/storage/framework/views
          mkdir -p deploy/laravel_core/storage/logs

          # Buat .gitkeep agar folder tidak kosong saat FTP
          touch deploy/laravel_core/storage/app/public/.gitkeep
          touch deploy/laravel_core/storage/framework/cache/data/.gitkeep
          touch deploy/laravel_core/storage/framework/sessions/.gitkeep
          touch deploy/laravel_core/storage/framework/views/.gitkeep
          touch deploy/laravel_core/storage/logs/.gitkeep

          echo "✅ Deployment structure ready!"
          echo "📊 Total size:"
          du -sh deploy/

      # 9. Deploy ke InfinityFree via FTP
      - name: 🚀 Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy/
          server-dir: /htdocs/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            laravel_core/.env
            uploads/**
            laravel_core/storage